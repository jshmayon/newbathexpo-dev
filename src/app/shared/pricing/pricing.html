<section class="pricing">
  <div class="pricing-inner">
    <div class="section-header">
      <p class="eyebrow">Transparent Pricing</p>
      <h2>No Surprises.<br />Just Results.</h2>
      <p class="subtitle">Every project is unique — these are our starting ranges to help you plan with confidence.</p>
    </div>

    <div class="pricing-grid">
      @for (item of items; track item.title) {
        <div class="pricing-card" [class.featured]="item.featured">
          @if (item.featured) {
            <div class="badge">Most Popular</div>
          }
          <h3>{{ item.title }}</h3>
          <div class="price">{{ item.price }}</div>
          <a routerLink="/bookings" class="book-btn">Book Now</a>
        </div>
      }
    </div>
  </div>
</section>
