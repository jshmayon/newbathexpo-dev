<header class="navbar" [class.scrolled]="scrolled">
  <div class="navbar-inner">
    <a routerLink="/" class="logo">
      <img src="assets/logo-text.png" alt="NewBath Expo" class="logo-img" />
    </a>

    <!-- Mobile hamburger button -->
    <button
      class="menu-toggle"
      [class.open]="menuOpen"
      (click)="toggleMenu()"
      aria-label="Toggle navigation menu"
    >
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

    <!-- Navigation links -->
    <nav class="nav-links" [class.show]="menuOpen">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="closeMenu()">Home</a>
      <a routerLink="/gallery" routerLinkActive="active" (click)="closeMenu()">Gallery</a>
      <a routerLink="/bookings" routerLinkActive="active" (click)="closeMenu()">Bookings</a>
    </nav>
  </div>
</header>

<!-- Mobile overlay backdrop -->
@if (menuOpen) {
  <div class="nav-backdrop" (click)="closeMenu()"></div>
}
