<form class="booking-form">
  <div class="form-row">
    <div class="form-group">
      <label>First Name</label>
      <input type="text" placeholder="John" />
    </div>
    <div class="form-group">
      <label>Last Name</label>
      <input type="text" placeholder="Doe" />
    </div>
  </div>
  <div class="form-group">
    <label>Email</label>
    <input type="email" placeholder="john@example.com" />
  </div>
  <div class="form-group">
    <label>Phone</label>
    <input type="tel" placeholder="(555) 000-0000" />
  </div>
  <div class="form-group">
    <label>Service Type</label>
    <select>
      <option value="" disabled selected>Select a service...</option>
      <option value="consultation">In-Home or Virtual Consultation</option>
      <option value="tub-to-shower">Tub-to-Shower Remodel</option>
      <option value="walk-in-tub">Walk-in Tub Remodel</option>
      <option value="full-remodel">Full Bathroom Remodel</option>
      <option value="others">Others</option>
    </select>
  </div>
  <div class="form-group">
    <label>Preferred Date</label>
    <input type="date" />
  </div>
  <div class="form-group">
    <label>Project Details</label>
    <textarea rows="4" placeholder="Tell us about your bathroom remodel..."></textarea>
  </div>
  <button type="submit" class="submit-btn">Request Consultation</button>
</form>
