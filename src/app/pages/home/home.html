<section class="hero">
  <video #heroVideo autoplay [muted]="true" loop playsinline class="hero-video">
    <source src="assets/file.mp4" type="video/mp4" />
  </video>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <p class="hero-eyebrow">Trusted Bathroom Experts</p>
    <h1>We Make Bathroom<br />Remodeling Easy<br /><span>And Affordable</span></h1>
    <p class="hero-sub">Transform your bathroom with our expert team — on time, on budget, every time.</p>
    <div class="hero-actions">
      <a routerLink="/bookings" class="btn-primary">Book a Consultation</a>
      <a href="#" class="btn-ghost">See Our Work</a>
    </div>
  </div>
</section>
